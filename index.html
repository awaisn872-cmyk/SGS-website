<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Grading System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Student Grading System</h1>
    <h2>Add Student</h2>
    <input type="number" id="id" placeholder="Student ID">
    <input type="text" id="name" placeholder="Student Name">

    <div class="marks">
        <input type="number" id="m1" placeholder="Subject 1">
        <input type="number" id="m2" placeholder="Subject 2">
        <input type="number" id="m3" placeholder="Subject 3">
        <input type="number" id="m4" placeholder="Subject 4">
        <input type="number" id="m5" placeholder="Subject 5">
    </div>

    <button onclick="addStudent()">Add Student</button>
    <button onclick="calculateAll()">Calculate GPA</button>
    <button onclick="sortByGPA()">Sort By GPA</button>

    <h2>All Students</h2>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>GPA</th>
                <th>Grade</th>
            </tr>
        </thead>
        <tbody id="studentTable"></tbody>
    </table>

    <button onclick="generateReport()">Generate Report</button>
    <pre id="report"></pre>
</div>

<script src="script.js"></script>
</body>
</html>
